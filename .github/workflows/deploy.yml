name: Deploy no GitHub Pages

on:
  push:
    branches:
      - main  # dispara a cada push na branch main

  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: artifacts/orca-slicer-course/package.json

      - name: Instalar dependências
        working-directory: artifacts/orca-slicer-course
        run: npm install

      - name: Build
        working-directory: artifacts/orca-slicer-course
        run: npm run build
        env:
          NODE_ENV: production

      - name: Copiar 404.html para pasta dist
        working-directory: artifacts/orca-slicer-course
        run: cp public/404.html dist/404.html

      - name: Upload para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/orca-slicer-course/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
