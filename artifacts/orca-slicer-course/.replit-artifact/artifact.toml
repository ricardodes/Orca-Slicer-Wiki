kind = "web"
previewPath = "/"
title = "OrcaSlicer — Curso Avançado"
version = "1.0.0"
id = "artifacts/orca-slicer-course"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22180

[services.development]
run = "pnpm --filter @workspace/orca-slicer-course run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orca-slicer-course", "run", "build" ]
publicDir = "artifacts/orca-slicer-course/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22180"
BASE_PATH = "/"
